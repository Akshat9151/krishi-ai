<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Krishi AI – Crop Predictor</title>

  <!-- ✅ CORRECT CSS FILE -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 🔐 SESSION CHECK -->
<script>
  const loggedInUser = localStorage.getItem("loggedInUser");
  if (!loggedInUser) {
    window.location.href = "login.html";
  }
</script>

<!-- ================= HEADER ================= -->
<header class="main-header">

  <div class="header-left">
    <img src="statics/images/logo.jpg" alt="Krishi AI Logo" class="header-logo" />
    <div class="header-title">
      <h1>Krishi AI</h1>
      <span>Your Smart Agriculture Assistant</span>
    </div>
  </div>

  <!-- ☰ Hamburger -->
  <button class="menu-toggle" id="menuToggle">☰</button>

  <!-- Navigation -->
  <nav class="header-nav" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="disease.html">Disease</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- 👤 PROFILE -->
  <div class="profile-wrapper">
    <div class="profile-btn" id="profileBtn">
      <img src="profile image.webp" class="profile-img" />
      <span id="profileName">User</span>
      <span class="arrow">▼</span>
    </div>

    <div class="profile-dropdown" id="profileDropdown">
      <p class="dropdown-user">👤 <span id="dropdownUser"></span></p>
      <a href="profile.html">My Profile</a>
      <a href="settings.html">Settings</a>
      <hr />
      <a href="#" class="logout" onclick="logout()">Logout</a>
    </div>
  </div>

</header>
<!-- ================= HEADER END ================= -->

<!-- 🌍 LANGUAGE BAR -->
<div class="language-bar">
  <div id="google_translate_element"></div>
</div>

<!-- ================= MAIN ================= -->
<main>
  <form id="cropForm">

    <div class="input-group">
      <label>Soil Type:</label>
      <input type="text" id="soilType" required placeholder="e.g., loamy, sandy" />
    </div>

    <div class="input-group">
      <label>City:</label>
      <input type="text" id="city" required placeholder="e.g., Jaipur" />
    </div>

    <div class="input-group">
      <label>Season:</label>
      <select id="season" required>
        <option value="">Select</option>
        <option value="rabi">Rabi</option>
        <option value="kharif">Kharif</option>
        <option value="zaid">Zaid</option>
      </select>
    </div>

    <button type="submit" class="predict-btn">
      🌾 Predict Best Crop for Your Land
    </button>

    <button type="button" onclick="toggleDarkMode()">🌙</button>
  </form>

  <div id="result"></div>
</main>
<!-- ================= MAIN END ================= -->

<!-- ================= JS ================= -->
<script src="script.js"></script>

<script>
  // 👤 Show logged-in username
  document.getElementById("profileName").textContent = loggedInUser;
  document.getElementById("dropdownUser").textContent = loggedInUser;

  // ☰ Mobile menu toggle
  const menuToggle = document.getElementById("menuToggle");
  const mobileMenu = document.getElementById("mobileMenu");

  menuToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    mobileMenu.classList.toggle("show");
  });

  // 👤 Profile dropdown toggle
  const profileBtn = document.getElementById("profileBtn");
  const profileDropdown = document.getElementById("profileDropdown");

  profileBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    profileDropdown.classList.toggle("show");
  });

  document.addEventListener("click", () => {
    profileDropdown.classList.remove("show");
    mobileMenu.classList.remove("show");
  });

  // 🌙 Dark mode
  if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark-mode");
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    localStorage.setItem(
      "darkMode",
      document.body.classList.contains("dark-mode")
    );
  }

  // 🚪 Logout
  function logout() {
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("darkMode");
    window.location.href = "login.html";
  }
</script>

<!-- 🌐 GOOGLE TRANSLATE -->
<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      { pageLanguage: 'en' },
      'google_translate_element'
    );
  }
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
