<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरी कार्ट - Krishi AI Store</title>
    <link rel="stylesheet" href="store.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Same Header -->
    <header class="store-header">
        <!-- Copy header from index.html -->
    </header>

    <main class="cart-page">
        <div class="container">
            <h1 class="page-title">मेरी शॉपिंग कार्ट</h1>
            
            <div class="cart-content">
                <div class="cart-table">
                    <div class="cart-header">
                        <div>प्रोडक्ट</div>
                        <div>कीमत</div>
                        <div>मात्रा</div>
                        <div>कुल</div>
                        <div>हटाएं</div>
                    </div>
                    
                    <div class="cart-items" id="cart-items">
                        <!-- Cart items loaded via JavaScript -->
                    </div>
                </div>
                
                <div class="cart-summary">
                    <h2>ऑर्डर सारांश</h2>
                    <div class="price-breakdown">
                        <div class="price-row">
                            <span>सबटोटल</span>
                            <span id="cart-subtotal">₹0</span>
                        </div>
                        <div class="price-row">
                            <span>शिपिंग</span>
                            <span class="free">मुफ्त</span>
                        </div>
                        <div class="price-row total">
                            <span><strong>कुल राशि</strong></span>
                            <span><strong id="cart-total">₹0</strong></span>
                        </div>
                    </div>
                    
                    <div class="cart-actions">
                        <a href="index.html" class="btn-primary btn-continue-shopping">
                            <i class="fas fa-arrow-left"></i> शॉपिंग जारी रखें
                        </a>
                        <a href="checkout.html" class="btn-primary btn-checkout">
                            चेकआउट <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Same Footer -->
    <footer class="store-footer">
        <!-- Copy footer from index.html -->
    </footer>

    <script src="store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartDisplay();
        });
    </script>
</body>
</html>
