<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्रेणी - Krishi AI Store</title>
    <link rel="stylesheet" href="store.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Same Header as index.html -->
    <header class="store-header">
        <!-- Copy header from index.html -->
    </header>

    <main class="category-page">
        <div class="container">
            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <a href="index.html">होम</a>
                <i class="fas fa-chevron-right"></i>
                <span id="current-category">सभी उत्पाद</span>
            </div>

            <div class="category-content">
                <!-- Sidebar Filters -->
                <aside class="filters-sidebar">
                    <div class="filter-section">
                        <h3>श्रेणियाँ</h3>
                        <ul class="category-list">
                            <li><a href="#" data-category="all">सभी उत्पाद</a></li>
                            <li><a href="#" data-category="vegetable-seeds">सब्जी बीज</a></li>
                            <li><a href="#" data-category="fruit-seeds">फल बीज</a></li>
                            <li><a href="#" data-category="organic-fertilizers">जैविक खाद</a></li>
                            <li><a href="#" data-category="farming-tools">कृषि उपकरण</a></li>
                            <li><a href="#" data-category="irrigation">सिंचाई</a></li>
                            <li><a href="#" data-category="crop-protection">फसल संरक्षण</a></li>
                        </ul>
                    </div>

                    <div class="filter-section">
                        <h3>कीमत रेंज</h3>
                        <div class="price-filter">
                            <input type="range" id="price-range" min="0" max="5000" value="5000">
                            <div class="price-values">
                                <span>₹0</span>
                                <span id="max-price">₹5000</span>
                            </div>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>छूट</h3>
                        <div class="discount-filter">
                            <label>
                                <input type="checkbox" value="10">
                                <span>10% और ऊपर</span>
                            </label>
                            <label>
                                <input type="checkbox" value="20">
                                <span>20% और ऊपर</span>
                            </label>
                            <label>
                                <input type="checkbox" value="30">
                                <span>30% और ऊपर</span>
                            </label>
                            <label>
                                <input type="checkbox" value="40">
                                <span>40% और ऊपर</span>
                            </label>
                        </div>
                    </div>

                    <button class="btn-primary filter-btn" onclick="applyFilters()">
                        फिल्टर लागू करें
                    </button>
                    <button class="btn-secondary filter-btn" onclick="clearFilters()">
                        फिल्टर रीसेट करें
                    </button>
                </aside>

                <!-- Products Grid -->
                <section class="products-section">
                    <div class="products-header">
                        <h2 id="category-title">सभी उत्पाद</h2>
                        <div class="sort-options">
                            <select id="sort-by">
                                <option value="default">डिफ़ॉल्ट सॉर्ट</option>
                                <option value="price-low">कीमत: कम से ज्यादा</option>
                                <option value="price-high">कीमत: ज्यादा से कम</option>
                                <option value="popular">लोकप्रियता</option>
                                <option value="newest">नए आइटम</option>
                            </select>
                        </div>
                    </div>

                    <div class="products-grid" id="category-products">
                        <!-- Products loaded via JavaScript -->
                    </div>

                    <!-- Pagination -->
                    <div class="pagination">
                        <button class="page-btn" disabled><i class="fas fa-chevron-left"></i></button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Same Footer as index.html -->
    <footer class="store-footer">
        <!-- Copy footer from index.html -->
    </footer>

    <script src="store.js"></script>
    <script src="category.js"></script>
</body>
</html>
