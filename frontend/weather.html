<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather Insights | Krishi AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="main-header">
  <div class="header-left">
    <h2>🌦️ Weather Insights</h2>
  </div>
</header>

<main>
  <section class="feature-section">
    <h3>Check Live Weather for Farming</h3>

    <form id="weatherForm">
      <input type="text" id="city" placeholder="Enter City (e.g., Jaipur)" required />
      <button type="submit">🌦️ Get Weather</button>
    </form>

    <div id="weatherResult"></div>
  </section>
</main>

<script src="weather.js"></script>
</body>
</html>
