<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Assistant | Krishi AI</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
 <header class="main-header">
  <div class="header-left">
    <img src="statics/images/logo.jpg" alt="Krishi AI Logo" class="header-logo" />
    <div class="header-title">
      <h1>Krishi AI</h1>
      <span>Your Smart Agriculture Assistant</span>
    </div>
  </div>

  <button class="menu-toggle" id="menuToggle">☰</button>

  <nav class="header-nav" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="disease.html">Disease</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="language-bar">
  <select id="languageSelect" style="padding: 8px 12px; border-radius: 8px; border: 2px solid #43a047; cursor: pointer;">
    <option value="en">English</option>
    <option value="hi">हिंदी</option>
    <option value="hinglish">Hinglish</option>
  </select>
  <div id="google_translate_element" style="margin-left: auto;"></div>
</div>

<main>
  <h2>🤖 AI Assistant</h2>
  <p>Ask Krishi AI for crop, disease, fertilizer, irrigation, or weather advice in Hindi / Hinglish.</p>

  <section class="feature-section">
    <div class="assistant-panel">
      <div id="assistantChat" class="chat-box"></div>

      <form id="assistantForm" class="assistant-form">
        <div style="display: flex; gap: 12px; align-items: flex-start;">
          <textarea id="assistantMessage" rows="3" placeholder="Mere gehu ke patte pe peele daag aa rahe hain..." required style="flex: 1;"></textarea>
          <button type="button" id="voiceBtn" class="voice-btn" title="Speak your question">
            🎤 Speak
          </button>
        </div>
        <button type="submit" style="width: 100%;">Send</button>
      </form>

      <div id="assistantStatus" class="assistant-status"></div>
    </div>

    <div class="assistant-help">
      <h3>🎯 Suggested Prompts</h3>
      <div class="suggested-prompts">
        <button class="prompt-btn" data-prompt="Gehu me peele daag aa rahe hain, kya karun?">🌾 Gehu me peele daag aa rahe hain</button>
        <button class="prompt-btn" data-prompt="Mitti me paani kaise maintain karu?">💧 Mitti me paani kaise maintain karu?</button>
        <button class="prompt-btn" data-prompt="Rice ke liye best fertilizer kya hai?">🌱 Rice ke liye best fertilizer kya hai?</button>
        <button class="prompt-btn" data-prompt="Mausam kaise dekhun aur fasal kaise bachau?">🌤️ Mausam kaise dekhun aur fasal kaise bachau?</button>
        <button class="prompt-btn" data-prompt="Cotton ke liye best crop cycle kya hai?">🌿 Cotton ke liye best crop cycle kya hai?</button>
        <button class="prompt-btn" data-prompt="Sukhe mausam me irrigation kaise karein?">☀️ Sukhe mausam me irrigation kaise karein?</button>
      </div>
    </div>
  </section>
</main>

<script type="module" src="assistant.config.js"></script>
<script src="voice.js"></script>
<script src="i18n.js"></script>
<script src="weather-service.js"></script>
<script src="assistant-enhanced.js"></script>

<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      { pageLanguage: 'en' },
      'google_translate_element'
    );
  }
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
