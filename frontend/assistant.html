<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Assistant | Krishi AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="main-header">
  <div class="header-left">
    <img src="statics/images/logo.jpg" class="header-logo" />
    <div class="header-title">
      <h1>Krishi AI</h1>
      <span>Your Smart Agriculture Assistant</span>
    </div>
  </div>
</header>

<!-- 🌍 LANGUAGE BAR -->
<div class="language-bar">
  <div id="google_translate_element"></div>
</div>

<!-- ================= MAIN ================= -->
<main class="assistant-container">
  <h2>🤖 Krishi AI Assistant</h2>
  <p class="assistant-sub">
    Apna farming sawal likho ya bolo (Hindi / Hinglish / English)
  </p>

  <!-- 💬 CHAT BOX -->
  <div id="chatBox" class="chat-box"></div>

  <!-- 🎤 INPUT FORM -->
  <form id="assistantForm" class="assistant-form">
    <input
      type="text"
      id="userInput"
      placeholder="Jaise: Gehu me peele dhabbe aa rahe hain"
      required
    />
    <button type="submit">Send</button>
    <button type="button" onclick="startVoice()">🎤</button>
  </form>
</main>

<!-- ================= JS ================= -->
<script>
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");

/* =========================
   💬 Add Chat Bubble
=========================== */
function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = sender === "user" ? "chat user" : "chat bot";
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* =========================
   🤖 Send to Backend
=========================== */
document.getElementById("assistantForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  // Loading bubble
  const loadingDiv = document.createElement("div");
  loadingDiv.className = "chat bot";
  loadingDiv.innerText = "⏳ Krishi AI soch raha hai...";
  chatBox.appendChild(loadingDiv);

  try {
    const res = await fetch("http://127.0.0.1:8000/api/ai-assistant", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: message })
    });

    const data = await res.json();
    chatBox.removeChild(loadingDiv);

    // ✅ FINAL FIX (NO [object Object])
    const replyText =
      typeof data.reply === "string"
        ? data.reply
        : data.reply?.answer || "Kuch samasya aa gayi, dobara poochiye.";

    addMessage(replyText, "bot");
    speak(replyText);

  } catch (err) {
    chatBox.removeChild(loadingDiv);
    addMessage("❌ Server error. Phir try karo.", "bot");
  }
});

/* =========================
   🎤 Voice Input
=========================== */
function startVoice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice input supported nahi hai is browser me.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "hi-IN"; // Hindi (English bhi auto handle ho jayega)
  recognition.start();

  recognition.onresult = (event) => {
    input.value = event.results[0][0].transcript;
  };
}

/* =========================
   🔊 Voice Output
=========================== */
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "hi-IN"; // Hindi voice
  window.speechSynthesis.speak(utterance);
}
</script>

<!-- 🌐 GOOGLE TRANSLATE -->
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement(
    { pageLanguage: "en" },
    "google_translate_element"
  );
}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
