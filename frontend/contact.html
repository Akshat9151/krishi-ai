<html>
<head>
  <title>Contact – Krishi AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="main-header">

  <div class="header-left">
    <img src="statics/images/logo.jpg" alt="Krishi AI Logo" class="header-logo" />
    <div class="header-title">
      <h1>Krishi AI</h1>
      <span>Your Smart Agriculture Assistant</span>
    </div>

  <!-- ☰ Hamburger -->

<!-- 🌍 LANGUAGE BAR -->
<div class="language-bar">
  <div id="google_translate_element"></div>
</div>




  <main>
  <h1>Contact Us</h1>
  <form>
    <label>Name:</label>
    <input type="text" name="name" placeholder="Enter your name" required />

    <label>Email:</label>
    <input type="email" name="email" placeholder="Enter your email" required />

    <label>Your Message:</label>
    <textarea name="message" placeholder="Write your feedback or query here..." required></textarea>

    <button type="submit">Send</button>
    <div id="contactStatus"></div>
  </form>
</main>
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      { pageLanguage: 'en' },
      'google_translate_element'
    );
  }
</script>

<script type="text/javascript"
  src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
