<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Profile – Krishi AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<script>
  // 🔐 Session check
  const user = localStorage.getItem("loggedInUser");
  if (!user) {
    window.location.href = "login.html";
  }
</script>

<div class="profile-page">
  
  <div class="profile-avatar">🌾</div>

  <h2>👤 My Profile</h2>

  <div class="profile-card">
    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Role:</strong> Farmer 🌱</p>
    <p><strong>Last City:</strong> <span id="city">–</span></p>
    <p><strong>Preferred Season:</strong> <span id="season">–</span></p>
  </div>

</div>

<script>
  // 👤 Fill profile data (abhi localStorage se)
  document.getElementById("name").textContent =
    localStorage.getItem("loggedInUser");

  // Future-ready (jab backend connect hoga)
  document.getElementById("city").textContent =
    localStorage.getItem("lastCity") || "–";

  document.getElementById("season").textContent =
    localStorage.getItem("preferredSeason") || "–";
</script>

</body>
</html>
